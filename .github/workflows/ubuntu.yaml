name: ubuntu

on:
  workflow_dispatch:        # lets us trigger an AppImage build from any branch via the Actions UI
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ubuntu-build:
    runs-on: ${{ matrix.ubuntu-distro }}
    permissions:
      contents: write   # softprops/action-gh-release needs write to update releases on tag pushes
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu-distro: ubuntu-22.04
            arch: x86_64
          - ubuntu-distro: ubuntu-22.04-arm
            arch: aarch64

    steps:
      - name: Sync repository
        uses: actions/checkout@v6

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: software-properties-common python3 python3-dev qtbase5-dev libqt5svg5-dev libqt5websockets5-dev libqt5opengl5-dev libqt5x11extras5-dev libprotoc-dev ccache libmosquitto-dev ca-certificates lsb-release wget libcurl4-openssl-dev
          version: 2.1

      - name: Install Apache Arrow for Parquet support
        shell: bash
        run: |
          wget https://packages.apache.org/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt install -y -V ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt update
          sudo apt install -y -V libarrow-dev libarrow-flight-dev libparquet-dev

      - name: Prepare ccache
        shell: bash
        run: |
          mkdir -p ${{ runner.temp }}/ccache/tmp

      - name: Save ccache folder
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ccache
          key: ${{ runner.os }}-${{ matrix.ubuntu-distro }}

      - name: Build Plotjuggler
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          CCACHE_DIR: ${{ runner.temp }}/ccache
        run: |
            cmake . -B build -DCMAKE_BUILD_TYPE=Release -DPJ_INSTALLATION="appimage" \
                  -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                  -DPJ_PLUGINS_DIRECTORY="bin"
            grep -R "PJ_HAS_PYTHON" build/CMakeCache.txt build/plotjuggler_app/CMakeFiles  || true
            cmake --build build

      - name: Build AppImage
        working-directory: ${{ github.workspace }}
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          ARCH: ${{ matrix.arch }}
          BUILD_DIR: ${{ github.workspace }}/build
          SKIP_BUILD: "1"
        run: |
            # Reuses the build tree from the previous step and bundles the
            # matching Python stdlib + apprun-hook so the AppImage runs on
            # hosts whose system Python differs from the builder's.
            bash appimage/build_appimage.sh
            # ref_name contains '/' on feature branches; replace with '-' so it's a valid filename
            SAFE_REF="${GITHUB_REF_NAME//\//-}"
            mv PlotJuggler-${{ matrix.arch }}.AppImage "PlotJuggler-${SAFE_REF}-${{ matrix.arch }}.AppImage"
            echo "SAFE_REF=$SAFE_REF" >> "$GITHUB_ENV"

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          name: PlotJuggler-${{ env.SAFE_REF }}-${{ matrix.arch }}.AppImage
          path: PlotJuggler-${{ env.SAFE_REF }}-${{ matrix.arch }}.AppImage

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: PlotJuggler-${{ env.SAFE_REF }}-${{ matrix.arch }}.AppImage
          generate_release_notes: true
          fail_on_unmatched_files: false
