name: ros2-humble

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: software-properties-common python3 python3-dev qtbase5-dev libqt5svg5-dev libqt5websockets5-dev libqt5opengl5-dev libqt5x11extras5-dev libprotoc-dev libzmq3-dev liblz4-dev libzstd-dev libmosquitto-dev
          version: 1.0

      # Set up ROS
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      # ROS Python packages are installed outside the default sys.path on some
      # hosted runner image revisions. Expose them explicitly before CMake runs.
      - name: Fix Python path for ROS packages
        run: |
          PYVER=$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
          echo "PYTHONPATH=/opt/ros/humble/lib/python${PYVER}/site-packages:/usr/lib/python3/dist-packages:${PYTHONPATH}" >> "$GITHUB_ENV"

      # Run ROS CI
      - uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: plotjuggler
          target-ros2-distro: humble
